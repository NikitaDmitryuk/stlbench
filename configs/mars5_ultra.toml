# ELEGOO Mars 5 Ultra — typical build volume (~6.04 × 3.06 × 6.49 in, mm).
# Adjust from your printer manual if needed.

[printer]
name = "Elegoo Mars 5 Ultra"
width_mm = 153.36
depth_mm = 77.76
height_mm = 165.0

[scaling]
# Multiplier applied after geometry fit (<1 leaves room for slicer, brim, clearance; 1.0 = none).
post_fit_scale = 0.95

[packing]
gap_mm = 5.0

[pipeline]
# Default step sequence for parts that do not specify their own steps in a job file.
# Valid sequences (layout must always be last):
#   ["scale", "orient", "layout"]  — global scale → orient → pack  (default)
#   ["orient", "scale", "layout"]  — orient first, then scale from oriented AABB
#   ["scale", "layout"]            — scale but skip overhang orientation
#   ["orient", "layout"]           — orient only, no scaling
#   ["layout"]                     — pack as-is (model already prepared)
default_steps = ["scale", "orient", "layout"]
