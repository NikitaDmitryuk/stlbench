# ELEGOO Mars 5 Ultra — typical build volume (~6.04 × 3.06 × 6.49 in, mm).
# Adjust from your printer manual if needed.

[printer]
name = "Elegoo Mars 5 Ultra"
width_mm = 153.36
depth_mm = 77.76
height_mm = 165.0

[scaling]
# Per-axis margin on bed/height (same idea as --margin): 0.02 ≈ 2% inset each side.
bed_margin = 0.02
# Multiplier applied after geometry fit (<1 leaves room for slicer, brim, clearance; 1.0 = none).
post_fit_scale = 0.95

[packing]
gap_mm = 0.5

[hollow]
# Used only with scale --hollow (voxel shell, trimesh + scipy).
wall_thickness_mm = 2.0
voxel_mm = 0.5
